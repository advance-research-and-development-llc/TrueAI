name: Auto-Merge (Trusted Authors)

# Flips GitHub's auto-merge (squash) toggle on PRs opened by trusted
# authors (the repo owner and the official Copilot / GitHub Actions
# bots) so they merge automatically the moment all required checks go
# green AND the CODEOWNERS approval lands.
#
# IMPORTANT — this does NOT bypass any branch-protection rule. The
# default-branch ruleset (`.github/rulesets/protect-default-branch.json`)
# still requires:
#   - 1 approving review from CODEOWNERS (the owner) AND
#   - all required status checks green (CodeQL JS/TS, CodeQL Java/Kotlin,
#     Android CI) AND
#   - all review threads resolved AND
#   - linear history (squash merge).
#
# This workflow only saves the manual click of pressing "Enable auto-merge".
# Owner can still dismiss approval or request changes to halt the merge.
#
# Required repo settings (Settings → General → Pull Requests):
#   ✅ Allow auto-merge
#   ✅ Allow squash merging
#   ✅ Allow GitHub Actions to create and approve pull requests
#      (Settings → Actions → General → Workflow permissions)
#
# Dependabot PRs are handled separately by `dependabot-auto-merge.yml`
# and are skipped here to avoid double-enabling.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    # Only act on same-repo PRs (forks have no write token), skip drafts,
    # skip Dependabot (handled by dependabot-auto-merge.yml), and only
    # act for explicitly trusted authors.
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      (
        github.event.pull_request.user.login == 'smackypants' ||
        github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
        github.event.pull_request.user.login == 'Copilot' ||
        github.event.pull_request.user.login == 'github-actions[bot]' ||
        contains(github.event.pull_request.labels.*.name, 'automerge')
      )
    runs-on: ubuntu-latest
    steps:
      # Refuse to enable auto-merge on PRs classified `risk:high` or
      # `risk:agent-surface` — these touch governance / credentials /
      # overrides / agent prompts and MUST be reviewed manually. The
      # PR Risk Labeller workflow assigns these labels; this step is a
      # defence-in-depth check that does not weaken any existing
      # branch-protection rule (CODEOWNERS approval is still required
      # by the ruleset for everything).
      - name: Refuse on risk:high or risk:agent-surface
        if: >-
          contains(github.event.pull_request.labels.*.name, 'risk:high') ||
          contains(github.event.pull_request.labels.*.name, 'risk:agent-surface')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IS_HIGH: ${{ contains(github.event.pull_request.labels.*.name, 'risk:high') }}
          IS_AGENT: ${{ contains(github.event.pull_request.labels.*.name, 'risk:agent-surface') }}
        run: |
          if [ "$IS_HIGH" = "true" ] && [ "$IS_AGENT" = "true" ]; then
            REASON="risk:high + risk:agent-surface"
            DETAIL="touches governance files / credentials / overrides AND the agent prompt surface"
          elif [ "$IS_HIGH" = "true" ]; then
            REASON="risk:high"
            DETAIL="touches governance files, credentials, or dependency overrides"
          else
            REASON="risk:agent-surface"
            DETAIL="touches the Copilot / agent prompt surface (\`.github/agents/**\`, \`.github/copilot/**\`, \`AGENTS.md\`, or \`src/lib/agent/**\`)"
          fi
          echo "::warning ::PR #${PR_NUMBER} is ${REASON} — auto-merge will NOT be enabled."
          MARKER='<!-- risk:no-automerge -->'
          if ! gh pr view "$PR_NUMBER" --repo "$REPO" --json comments --jq '.comments[].body' | grep -q "$MARKER"; then
            BODY="$MARKER"$'\n'"🛡️ This PR is classified \`${REASON}\` (${DETAIL}). Auto-merge is intentionally disabled — please review and merge manually after CODEOWNERS approval."
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"
          fi
          exit 0

      - name: Enable auto-merge (squash)
        if: >-
          !contains(github.event.pull_request.labels.*.name, 'risk:high') &&
          !contains(github.event.pull_request.labels.*.name, 'risk:agent-surface')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # `gh pr merge --auto` is idempotent — calling it on a PR that
          # already has auto-merge enabled is a no-op. Branch protection
          # still gates the actual merge on required checks + CODEOWNERS
          # approval; this just flips the toggle.
          gh pr merge --auto --squash "$PR_URL"
