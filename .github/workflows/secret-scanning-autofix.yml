name: Secret Scanning Auto-Fix Dispatch

# Mirrors codeql-autofix.yml. Listens for secret_scanning_alert events
# and creates a Copilot fix issue with rotation + revocation guidance.
#
# Prerequisites (owner must enable once):
#   Settings → Security → Code security → Secret scanning: ENABLED
#   Settings → Security → Code security → Push protection: ENABLED
#
# Without secret scanning enabled the `secret_scanning_alert` event
# never fires.

on:
  secret_scanning_alert:
    types: [created, reopened]

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    name: Dispatch secret-leak fix issue
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Dispatch fix issue
        uses: ./.github/actions/dispatch-fix-issue
        with:
          github-token: ${{ secrets.AGENT_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          bug-type: 'secret-leak'
          fragment: 'fix-secret-leak'
          severity: 'critical'
          # Title must contain the dedup key for future runs to find it.
          title: "[Security] Secret leak — ${{ github.event.alert.secret_type_display_name }} (alert #${{ github.event.alert.number }})"
          dedup-key: "alert #${{ github.event.alert.number }}"
          labels: 'copilot-fix,security,bug'
          finding-body: |
            **Alert:** [#${{ github.event.alert.number }}](${{ github.event.alert.html_url }})
            **Secret type:** `${{ github.event.alert.secret_type }}` — ${{ github.event.alert.secret_type_display_name }}
            **State:** `${{ github.event.alert.state }}`

            ⚠️ **Treat the secret as compromised the moment this issue
            opens.** Rotate it in the upstream provider BEFORE
            attempting any code change. The leaked value must be
            considered public.
