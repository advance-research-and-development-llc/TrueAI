name: Copilot Setup Steps

# Pre-provisions the GitHub Copilot cloud agent's ephemeral dev environment
# so it has the exact toolchain CI uses (Node 24, Temurin JDK 21, Android
# SDK) and the project's npm dependencies already installed before the agent
# starts working on a task. Without this, the agent has to rediscover the
# toolchain on every session via trial-and-error.
#
# Validated against existing CI: .github/workflows/android.yml uses the
# same Node 24 + JDK 21 + Android SDK combination.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` or the Copilot cloud agent
  # will not pick it up.
  copilot-setup-steps:
    # Use the largest runner the org has provisioned (e.g. ubuntu-4-core,
    # ubuntu-8-core) by setting the repository / org Actions variable
    # COPILOT_RUNNER. Falls back to standard ubuntu-latest so this
    # workflow keeps working even if larger runners aren't enabled.
    # See: Settings → Secrets and variables → Actions → Variables.
    runs-on: ${{ vars.COPILOT_RUNNER || 'ubuntu-latest' }}
    # Maximum allowed by the Copilot cloud agent (cap is 59). Gives the
    # agent the longest possible window to install deps, build the
    # Android project, run tests, etc., before its task starts.
    timeout-minutes: 59

    # Lowest permissions needed for the setup steps. Copilot is given its
    # own (separate, broader) token for its actual work after these steps
    # complete.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Node 24 / npm 11 is required so optional native-binary entries
      # (lightningcss-*, @rollup/rollup-*, fsevents) in package-lock.json
      # are honored. Older Node versions cause `npm ci` to fail with
      # "Missing: lightningcss-* from lock file".
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Capacitor 8 (used by this project) requires JDK 21 for Gradle
      # builds — capacitor-android is compiled with --release 21. JDK 17
      # produces "invalid source release: 21" on capacitor-android.
      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # Pre-install the Android SDK so any agent task touching the native
      # Android project (android/, AndroidManifest.xml, gradle files) can
      # build immediately without waiting on a fresh SDK download.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # Pre-install agent-friendly CLIs that the dispatcher / audit
      # workflows shell out to. These are tiny apt packages — installing
      # them up-front saves time and prevents transient apt failures
      # mid-task. `gh` and `jq` are already present on ubuntu-latest, but
      # we re-install defensively in case a custom runner image lacks them.
      - name: Pre-install agent-friendly CLIs
        run: |
          set -eux
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            jq ripgrep shellcheck
          # actionlint: install via the upstream installer (no apt package).
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest /usr/local/bin || sudo mv ./actionlint /usr/local/bin/ || true
          actionlint -version || true
          # `gh` ships on ubuntu-latest; verify rather than reinstall.
          gh --version || (
            sudo mkdir -p -m 755 /etc/apt/keyrings && \
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null && \
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null && \
            sudo apt-get update -y && \
            sudo apt-get install -y gh
          )
        continue-on-error: true

      # Pre-warm the Gradle wrapper distribution & build cache so the
      # FIRST `./android/gradlew ...` invocation by the agent doesn't
      # spend 60-90 seconds downloading Gradle. Cache key is the gradle
      # wrapper properties + build files so it invalidates correctly on
      # Gradle / dep upgrades.
      - name: Cache Gradle caches & wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle*', 'android/**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Bootstrap Gradle wrapper distribution
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            JAVA_HOME=/usr/lib/jvm/temurin-21-jdk-amd64 \
              ./android/gradlew --version || true
          fi
        continue-on-error: true

      - name: Install npm dependencies (npm ci)
        run: npm ci
        # Don't fail the whole setup if npm ci hits a transient registry
        # issue or the Copilot firewall blocks an optional download — the
        # agent can still work and re-run npm ci itself.
        continue-on-error: true

      - name: Print toolchain summary
        run: |
          echo "Node:       $(node --version)"
          echo "npm:        $(npm --version)"
          echo "Java:       $(java -version 2>&1 | head -1)"
          echo "Gradle:     $(test -f android/gradlew && android/gradlew --version | grep '^Gradle' || echo 'not yet bootstrapped')"
          echo "jq:         $(jq --version 2>/dev/null || echo 'missing')"
          echo "gh:         $(gh --version 2>/dev/null | head -1 || echo 'missing')"
          echo "ripgrep:    $(rg --version 2>/dev/null | head -1 || echo 'missing')"
          echo "shellcheck: $(shellcheck --version 2>/dev/null | grep '^version:' || echo 'missing')"
          echo "actionlint: $(actionlint -version 2>/dev/null | head -1 || echo 'missing')"
          echo "Runner:     ${{ runner.name }} (label resolved from COPILOT_RUNNER='${{ vars.COPILOT_RUNNER || 'ubuntu-latest' }}')"
