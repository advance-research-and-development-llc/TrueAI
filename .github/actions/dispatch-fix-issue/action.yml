name: Dispatch Copilot fix issue
description: >
  Create (or update / reopen) a GitHub issue assigned to the Copilot
  coding agent for a single defect. Encapsulates dedup, label creation,
  body templating, and the universal hard-constraints contract from
  .github/copilot/PROMPTS.md so every dispatcher workflow produces
  consistent issues.

inputs:
  github-token:
    description: Token with issues:write (use AGENT_AUTOMATION_TOKEN if available, else GITHUB_TOKEN).
    required: true
  repo:
    description: 'owner/repo'
    required: true
  bug-type:
    description: >
      One of: codeql-alert, lint-error, test-failure, dependency-vuln,
      coverage-gap, secret-leak, compatibility, android-lint, other.
    required: true
  fragment:
    description: >
      Prompt fragment name from .github/copilot/PROMPTS.md. One of:
      fix-codeql, fix-lint, fix-test-failure, fix-android-lint,
      dep-vuln-bump, coverage-gap-fill, fix-secret-leak,
      fix-compatibility.
    required: true
  title:
    description: Issue title. The dedup search uses a substring of this title.
    required: true
  dedup-key:
    description: >
      Substring used to find existing open issues for the same defect.
      Typically the alert number, file path, or rule id. The action
      will not open a duplicate if any open issue contains this
      substring in its title AND has all of the requested labels.
    required: true
  labels:
    description: Comma-separated label list (always includes `copilot-fix`).
    required: false
    default: 'copilot-fix,bug'
  severity:
    description: 'critical | high | medium | low | info'
    required: false
    default: 'medium'
  finding-body:
    description: >
      Markdown describing the specific finding (file, line, message,
      excerpt). Will be embedded into the issue body under
      `### Finding`.
    required: true
  reopen-closed:
    description: 'If `true`, reopen a recently-closed dedup match instead of creating a new issue.'
    required: false
    default: 'true'
  assignee:
    description: GitHub username to assign the issue to.
    required: false
    default: 'copilot'
  throttle-cap:
    description: >
      Optional max number of open `copilot-fix` issues. If the cap is
      reached the action skips creation and exits cleanly (the
      finding is dropped on the floor — re-runs will pick it up once
      the queue drains). Set to '0' or empty to disable.
    required: false
    default: '25'
  escalate-after:
    description: >
      After this many *failed* prior attempts (closed-unmerged PRs
      referencing the dedup-matched issue) the action stops re-
      assigning Copilot, applies the `human-only` label, and posts a
      "manual triage required" notice. Set to '0' or empty to
      disable escalation. Phase 4.2 of the agent-upgrade plan.
    required: false
    default: '3'

outputs:
  action:
    description: 'create | update | reopen | escalate | skip-duplicate | skip-throttled | skip-escalated'
    value: ${{ steps.dispatch.outputs.action }}
  issue-number:
    description: Issue number that was created/updated/reopened (empty on skip).
    value: ${{ steps.dispatch.outputs.issue_number }}
  issue-url:
    description: HTML URL of the created/updated/reopened issue.
    value: ${{ steps.dispatch.outputs.issue_url }}
  prior-attempts:
    description: 'Number of failed prior attempts detected (closed-unmerged PRs referencing the matched issue). Zero for new issues.'
    value: ${{ steps.dispatch.outputs.prior_attempts }}

runs:
  using: composite
  steps:
    - name: Ensure required labels exist
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repo }}
        LABELS: ${{ inputs.labels }}
      run: |
        set -euo pipefail
        # Always ensure the canonical labels exist (idempotent --force).
        gh label create "copilot-fix"  --color "7057ff" --description "Automated fix dispatched to Copilot" --repo "$REPO" --force >/dev/null
        gh label create "bug"          --color "ee0701" --description "Something is not working"            --repo "$REPO" --force >/dev/null
        gh label create "security"     --color "d73a4a" --description "Security finding"                    --repo "$REPO" --force >/dev/null
        gh label create "needs-triage" --color "e4e669" --description "Low-priority finding awaiting triage" --repo "$REPO" --force >/dev/null
        gh label create "lint-error"   --color "fbca04" --description "ESLint / lint error"                 --repo "$REPO" --force >/dev/null
        gh label create "android-lint" --color "f9c74f" --description "Android Gradle lint failure"         --repo "$REPO" --force >/dev/null
        gh label create "test-failure" --color "e4e669" --description "CI / test failure"                   --repo "$REPO" --force >/dev/null
        gh label create "dependency-vuln" --color "5319e7" --description "Vulnerable dependency"            --repo "$REPO" --force >/dev/null
        gh label create "coverage-gap" --color "0e8a16" --description "Test coverage below threshold"        --repo "$REPO" --force >/dev/null
        gh label create "audit"        --color "bfd4f2" --description "Scheduled audit finding"             --repo "$REPO" --force >/dev/null
        gh label create "compatibility" --color "1d76db" --description "Compatibility-matrix finding"       --repo "$REPO" --force >/dev/null
        gh label create "human-only"   --color "b60205" --description "Do not assign Copilot — manual triage required" --repo "$REPO" --force >/dev/null
        # Risk labels (consumed by selective auto-merge)
        for risk in trivial low medium high; do
          gh label create "risk:${risk}" --color "ededed" --description "Risk classification: ${risk}" --repo "$REPO" --force >/dev/null
        done
        # And the user-requested ones
        IFS=',' read -ra REQ <<< "$LABELS"
        for L in "${REQ[@]}"; do
          L="$(echo "$L" | xargs)"
          [ -z "$L" ] && continue
          gh label create "$L" --color "cccccc" --description "Auto-created by dispatch-fix-issue" --repo "$REPO" --force >/dev/null || true
        done

    - name: Render universal constraints + fragment
      id: render
      shell: bash
      env:
        FRAGMENT: ${{ inputs.fragment }}
        BUG_TYPE: ${{ inputs.bug-type }}
        SEVERITY: ${{ inputs.severity }}
        FINDING: ${{ inputs.finding-body }}
      run: |
        set -euo pipefail
        BODY_FILE="$(mktemp)"
        {
          echo "## Auto-generated fix issue"
          echo
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| **Bug type** | \`${BUG_TYPE}\` |"
          echo "| **Severity** | \`${SEVERITY}\` |"
          echo "| **Prompt fragment** | [\`${FRAGMENT}\`](../blob/main/.github/copilot/PROMPTS.md#fragment-${FRAGMENT}) |"
          echo
          echo "### Finding"
          echo
          echo "${FINDING}"
          echo
          echo "### Universal hard constraints (do not skip any)"
          echo
          echo '- [ ] `npm ci` succeeds'
          echo '- [ ] `npm run lint` exits 0 (no new errors)'
          echo '- [ ] `npm run build:dev` succeeds'
          echo '- [ ] `npm test` passes — no newly failing tests'
          echo '- [ ] CodeQL must not introduce new alerts'
          echo '- [ ] `package.json` `overrides` pins must NOT be weakened'
          echo '- [ ] No telemetry, analytics, or third-party network calls added'
          echo '- [ ] `LICENSE`, `NOTICE`, and copyright headers are preserved'
          echo '- [ ] No edits under `.github/**` unless this issue explicitly requests them'
          echo
          echo "### Instructions for Copilot agent"
          echo
          echo "Read the prompt fragment **\`${FRAGMENT}\`** in"
          echo '[`.github/copilot/PROMPTS.md`](../blob/main/.github/copilot/PROMPTS.md)'
          echo "and follow it step-by-step. The fragment is the canonical contract;"
          echo "do not improvise an alternative workflow."
          echo
          echo "### Lessons learned"
          echo
          echo "Fill in the \`## Lessons learned\` section of the PR description"
          echo "when opening the fix PR — it is auto-ingested into"
          echo '`.github/copilot/LEARNINGS.md` on merge.'
        } > "$BODY_FILE"
        echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

    - name: Throttle check + dedup + dispatch
      id: dispatch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ inputs.repo }}
        TITLE: ${{ inputs.title }}
        DEDUP_KEY: ${{ inputs.dedup-key }}
        LABELS: ${{ inputs.labels }}
        BODY_FILE: ${{ steps.render.outputs.body_file }}
        REOPEN: ${{ inputs.reopen-closed }}
        ASSIGNEE: ${{ inputs.assignee }}
        THROTTLE_CAP: ${{ inputs.throttle-cap }}
        ESCALATE_AFTER: ${{ inputs.escalate-after }}
      run: |
        set -euo pipefail

        # Default outputs (overwritten on each terminal branch).
        echo "prior_attempts=0" >> "$GITHUB_OUTPUT"

        # ---- Helper: count failed prior-attempt PRs for an issue -------------
        # Walks the issue's timeline events for cross-referenced PRs,
        # then queries each PR's state. A "failed attempt" is a PR
        # closed without merge AND authored by the agent (so a manual
        # operator close doesn't count). Echoes count on first line,
        # then a markdown bullet list of the failed PRs.
        count_prior_attempts() {
          local issue="$1"
          local count=0
          local lines=""
          local events
          events=$(gh api "repos/${REPO}/issues/${issue}/timeline" \
            -H "Accept: application/vnd.github.mockingbird-preview+json" \
            --paginate --jq '
              [ .[]
                | select(.event=="cross-referenced")
                | select(.source.type=="issue")
                | select(.source.issue.pull_request != null)
                | .source.issue.number ]
              | unique
              | .[]
            ' 2>/dev/null || true)
          if [ -z "$events" ]; then
            printf '0\n'
            return 0
          fi
          while IFS= read -r pr; do
            [ -z "$pr" ] && continue
            local pr_json
            pr_json=$(gh pr view "$pr" --repo "$REPO" \
              --json number,state,merged,author,title,url,closedAt 2>/dev/null || echo "")
            if [ -z "$pr_json" ]; then
              echo "::warning ::dispatch-fix-issue: failed to fetch PR #${pr} (rate-limit / permissions / deleted?); skipping in prior-attempts count."
              continue
            fi
            local merged state author title url closed_at
            merged=$(printf '%s' "$pr_json" | jq -r '.merged // false')
            state=$(printf  '%s' "$pr_json" | jq -r '.state // ""')
            author=$(printf '%s' "$pr_json" | jq -r '.author.login // ""')
            title=$(printf  '%s' "$pr_json" | jq -r '.title // ""')
            url=$(printf    '%s' "$pr_json" | jq -r '.url // ""')
            closed_at=$(printf '%s' "$pr_json" | jq -r '.closedAt // ""')
            if [ "$merged" = "false" ] && [ "$state" = "CLOSED" ]; then
              case "$author" in
                Copilot|copilot-swe-agent*|github-actions*)
                  count=$((count + 1))
                  lines="${lines}- [#${pr}](${url}) — _${title}_ — closed without merge on ${closed_at%T*} by @${author}"$'\n'
                  ;;
              esac
            fi
          done <<< "$events"
          printf '%s\n' "$count"
          printf '%s'   "$lines"
        }

        # ---- Helper: append "### Prior attempts" to BODY_FILE, return count --
        append_prior_attempts() {
          local issue="$1"
          local result count lines
          result="$(count_prior_attempts "$issue")"
          count="$(printf '%s' "$result" | head -n1)"
          # Defensive: ensure we never write a non-numeric value to
          # GITHUB_OUTPUT or compare against ESCALATE_AFTER. The helper
          # always emits an integer on the first line, but bash arith
          # later does not tolerate stray whitespace or junk.
          count="${count//[^0-9]/}"
          count="${count:-0}"
          lines="$(printf '%s' "$result" | tail -n +2)"
          # Re-emit the prior_attempts output (overwrites the default 0).
          echo "prior_attempts=${count}" >> "$GITHUB_OUTPUT"
          if [ "${count:-0}" -gt 0 ] 2>/dev/null; then
            {
              echo
              echo "### Prior attempts (${count} failed)"
              echo
              echo "Earlier agent PRs that targeted this issue but did not"
              echo "merge. **Read each one** before opening a new PR — do"
              echo "not repeat the approach that already failed."
              echo
              printf '%s\n' "$lines"
            } >> "$BODY_FILE"
          fi
          printf '%s' "$count"
        }

        # ---- Throttle (D5) ---------------------------------------------------
        if [ -n "${THROTTLE_CAP:-}" ] && [ "${THROTTLE_CAP}" -gt 0 ] 2>/dev/null; then
          OPEN_COUNT=$(gh issue list --repo "$REPO" --label "copilot-fix" --state open --limit 200 --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "${OPEN_COUNT:-0}" -ge "${THROTTLE_CAP}" ]; then
            echo "::warning ::dispatch-fix-issue throttled: ${OPEN_COUNT} open copilot-fix issues ≥ cap ${THROTTLE_CAP}; skipping."
            echo "action=skip-throttled" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "issue_url="    >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        # ---- Dedup: open issue containing dedup key in title -----------------
        # Uses --search "in:title" to scope the substring match to the title.
        EXISTING_OPEN=$(gh issue list \
          --repo "$REPO" \
          --label "copilot-fix" \
          --state open \
          --search "\"${DEDUP_KEY}\" in:title" \
          --json number,title \
          --jq ".[] | select(.title | contains(\"${DEDUP_KEY}\")) | .number" \
          2>/dev/null | head -n1 || echo "")

        if [ -n "$EXISTING_OPEN" ]; then
          echo "Found open dedup match: #$EXISTING_OPEN — checking prior attempts."
          ATTEMPTS=$(append_prior_attempts "$EXISTING_OPEN")

          # ---- Escalation gate (Phase 4.2) ---------------------------------
          if [ -n "${ESCALATE_AFTER:-}" ] && [ "${ESCALATE_AFTER}" -gt 0 ] 2>/dev/null \
             && [ "${ATTEMPTS:-0}" -ge "${ESCALATE_AFTER}" ]; then
            {
              echo
              echo "### ⛔ Escalation — manual triage required"
              echo
              echo "This issue has been attempted **${ATTEMPTS}** times by the"
              echo "Copilot agent without a successful merge (threshold:"
              echo "\`escalate-after=${ESCALATE_AFTER}\`). Further auto-"
              echo "dispatch is suppressed; the \`human-only\` label has been"
              echo "applied. A maintainer should:"
              echo
              echo "1. Read the prior-attempt PRs above and identify the"
              echo "   shared blocker (missing context, broken test infra,"
              echo "   ambiguous requirements, etc.)."
              echo "2. Either fix the blocker and remove the \`human-only\`"
              echo "   label, or close the issue as wont-fix if the finding"
              echo "   is a false positive."
            } >> "$BODY_FILE"
            gh issue edit "$EXISTING_OPEN" --repo "$REPO" \
              --body-file "$BODY_FILE" --add-label "human-only" >/dev/null
            # Best-effort un-assign; failures are non-fatal (e.g. issue
            # was never assigned to begin with on the first escalation).
            gh issue edit "$EXISTING_OPEN" --repo "$REPO" \
              --remove-assignee "${ASSIGNEE:-copilot}" >/dev/null 2>&1 || true
            gh issue comment "$EXISTING_OPEN" --repo "$REPO" \
              --body "⛔ Escalated to \`human-only\` after ${ATTEMPTS} failed agent attempts (run #${GITHUB_RUN_ID:-unknown})." >/dev/null || true
            URL=$(gh issue view "$EXISTING_OPEN" --repo "$REPO" --json url --jq .url)
            echo "action=escalate"               >> "$GITHUB_OUTPUT"
            echo "issue_number=$EXISTING_OPEN"   >> "$GITHUB_OUTPUT"
            echo "issue_url=$URL"                >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh issue edit "$EXISTING_OPEN" --repo "$REPO" --body-file "$BODY_FILE" >/dev/null
          gh issue comment "$EXISTING_OPEN" --repo "$REPO" --body "🔄 Re-detected by [run #${GITHUB_RUN_ID:-unknown}](https://github.com/$REPO/actions/runs/${GITHUB_RUN_ID:-0}). Prior failed attempts: ${ATTEMPTS}." >/dev/null || true
          URL=$(gh issue view "$EXISTING_OPEN" --repo "$REPO" --json url --jq .url)
          echo "action=update"            >> "$GITHUB_OUTPUT"
          echo "issue_number=$EXISTING_OPEN" >> "$GITHUB_OUTPUT"
          echo "issue_url=$URL"           >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # ---- Reopen recently-closed dedup match ------------------------------
        if [ "$REOPEN" = "true" ]; then
          EXISTING_CLOSED=$(gh issue list \
            --repo "$REPO" \
            --label "copilot-fix" \
            --state closed \
            --search "\"${DEDUP_KEY}\" in:title" \
            --json number,title,closedAt \
            --jq "sort_by(.closedAt) | reverse | .[] | select(.title | contains(\"${DEDUP_KEY}\")) | .number" \
            2>/dev/null | head -n1 || echo "")
          if [ -n "$EXISTING_CLOSED" ]; then
            echo "Found recently-closed dedup match: #$EXISTING_CLOSED — checking prior attempts."
            ATTEMPTS=$(append_prior_attempts "$EXISTING_CLOSED")

            # Escalation gate (Phase 4.2) — same logic as open-issue path.
            if [ -n "${ESCALATE_AFTER:-}" ] && [ "${ESCALATE_AFTER}" -gt 0 ] 2>/dev/null \
               && [ "${ATTEMPTS:-0}" -ge "${ESCALATE_AFTER}" ]; then
              {
                echo
                echo "### ⛔ Escalation — manual triage required"
                echo
                echo "This issue has been attempted **${ATTEMPTS}** times by"
                echo "the Copilot agent without a successful merge"
                echo "(threshold: \`escalate-after=${ESCALATE_AFTER}\`)."
                echo "Re-detected, but auto-assignment to Copilot is"
                echo "suppressed; the \`human-only\` label has been applied."
              } >> "$BODY_FILE"
              gh issue reopen "$EXISTING_CLOSED" --repo "$REPO" >/dev/null
              gh issue edit   "$EXISTING_CLOSED" --repo "$REPO" \
                --body-file "$BODY_FILE" --add-label "human-only" >/dev/null
              gh issue comment "$EXISTING_CLOSED" --repo "$REPO" \
                --body "⛔ Reopened and escalated to \`human-only\` after ${ATTEMPTS} failed agent attempts (run #${GITHUB_RUN_ID:-unknown})." >/dev/null || true
              URL=$(gh issue view "$EXISTING_CLOSED" --repo "$REPO" --json url --jq .url)
              echo "action=escalate"                >> "$GITHUB_OUTPUT"
              echo "issue_number=$EXISTING_CLOSED"  >> "$GITHUB_OUTPUT"
              echo "issue_url=$URL"                 >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Found recently-closed dedup match: #$EXISTING_CLOSED — reopening."
            gh issue reopen "$EXISTING_CLOSED" --repo "$REPO" >/dev/null
            gh issue edit   "$EXISTING_CLOSED" --repo "$REPO" --body-file "$BODY_FILE" >/dev/null
            gh issue comment "$EXISTING_CLOSED" --repo "$REPO" --body "🔁 Reopened: defect re-detected by [run #${GITHUB_RUN_ID:-unknown}](https://github.com/$REPO/actions/runs/${GITHUB_RUN_ID:-0}). Prior failed attempts: ${ATTEMPTS}." >/dev/null || true
            URL=$(gh issue view "$EXISTING_CLOSED" --repo "$REPO" --json url --jq .url)
            echo "action=reopen"               >> "$GITHUB_OUTPUT"
            echo "issue_number=$EXISTING_CLOSED" >> "$GITHUB_OUTPUT"
            echo "issue_url=$URL"              >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        # ---- Create fresh issue ---------------------------------------------
        ARGS=(--repo "$REPO" --title "$TITLE" --body-file "$BODY_FILE" --label "$LABELS")
        if [ -n "$ASSIGNEE" ]; then
          ARGS+=(--assignee "$ASSIGNEE")
        fi
        URL=$(gh issue create "${ARGS[@]}")
        NUM=$(echo "$URL" | grep -oE '[0-9]+$' || echo "")
        echo "Created issue: $URL"
        echo "action=create"      >> "$GITHUB_OUTPUT"
        echo "issue_number=$NUM"  >> "$GITHUB_OUTPUT"
        echo "issue_url=$URL"     >> "$GITHUB_OUTPUT"
