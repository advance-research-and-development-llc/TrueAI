<svg width="160" height="120" viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.6">
    <rect x="30" y="20" width="100" height="80" rx="8" stroke="url(#dlGradient)" stroke-width="2"/>
    
    <path d="M80 40 L80 60 M70 50 L80 60 L90 50" stroke="url(#dlGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    
    <rect x="40" y="70" width="80" height="8" rx="4" fill="oklch(0.30 0.02 260)"/>
    <rect x="40" y="70" width="40" height="8" rx="4" fill="url(#progressGradient)">
      <animate attributeName="width" values="0;80;80" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <text x="80" y="92" font-family="JetBrains Mono, monospace" font-size="10" fill="#5CB8E4" text-anchor="middle" opacity="0.7">45%</text>
    
    <circle cx="140" cy="30" r="2" fill="#5CB8E4" opacity="0.5"/>
    <circle cx="20" cy="60" r="2" fill="#5CB8E4" opacity="0.5"/>
  </g>
  
  <defs>
    <linearGradient id="dlGradient" x1="30" y1="20" x2="130" y2="100">
      <stop offset="0%" stop-color="#5CB8E4"/>
      <stop offset="100%" stop-color="#4A7BA7"/>
    </linearGradient>
    <linearGradient id="progressGradient" x1="40" y1="70" x2="120" y2="78">
      <stop offset="0%" stop-color="#5CB8E4"/>
      <stop offset="100%" stop-color="#7A9FD6"/>
    </linearGradient>
  </defs>
</svg>
