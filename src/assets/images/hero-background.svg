<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="url(#heroBg)"/>
  
  <g opacity="0.1">
    <circle cx="100" cy="100" r="150" fill="url(#heroOrb1)"/>
    <circle cx="300" cy="200" r="120" fill="url(#heroOrb2)"/>
  </g>
  
  <g opacity="0.2">
    <path d="M0 150 Q100 130, 200 150 T400 150" stroke="#5CB8E4" stroke-width="1.5" fill="none"/>
    <path d="M0 180 Q100 160, 200 180 T400 180" stroke="#5CB8E4" stroke-width="1" fill="none"/>
    <path d="M0 120 Q100 100, 200 120 T400 120" stroke="#5CB8E4" stroke-width="1" fill="none"/>
  </g>
  
  <g opacity="0.3">
    <circle cx="50" cy="50" r="3" fill="#5CB8E4">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="80" r="2" fill="#5CB8E4">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="250" r="3" fill="#7A9FD6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="220" r="2" fill="#7A9FD6">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <rect x="150" y="120" width="100" height="60" rx="8" fill="oklch(0.25 0.01 260)" fill-opacity="0.4" stroke="url(#cardStroke)" stroke-width="1.5"/>
  <circle cx="175" cy="145" r="8" fill="url(#iconGradient)"/>
  <circle cx="200" cy="145" r="8" fill="url(#iconGradient)"/>
  <circle cx="225" cy="145" r="8" fill="url(#iconGradient)"/>
  <rect x="160" y="160" width="70" height="4" rx="2" fill="#5CB8E4" opacity="0.5"/>
  <rect x="160" y="168" width="55" height="4" rx="2" fill="#5CB8E4" opacity="0.3"/>
  
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="400" y2="300">
      <stop offset="0%" stop-color="oklch(0.18 0.01 260)"/>
      <stop offset="100%" stop-color="oklch(0.22 0.01 260)"/>
    </linearGradient>
    <radialGradient id="heroOrb1">
      <stop offset="0%" stop-color="#5CB8E4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5CB8E4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroOrb2">
      <stop offset="0%" stop-color="#7A9FD6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7A9FD6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="150" y1="120" x2="250" y2="180">
      <stop offset="0%" stop-color="#5CB8E4"/>
      <stop offset="100%" stop-color="#7A9FD6"/>
    </linearGradient>
    <linearGradient id="iconGradient" x1="175" y1="137" x2="225" y2="153">
      <stop offset="0%" stop-color="#5CB8E4"/>
      <stop offset="100%" stop-color="#7A9FD6"/>
    </linearGradient>
  </defs>
</svg>
