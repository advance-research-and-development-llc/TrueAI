<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="analytics-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB8E4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7A9FD6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="analytics-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7A9FD6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#5CB8E4;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="120" cy="120" r="100" fill="url(#analytics-grad-1)" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Bar Chart Container -->
  <rect x="40" y="60" width="160" height="120" rx="8" fill="none" stroke="#5CB8E4" stroke-width="2" opacity="0.6" />
  
  <!-- Chart Bars -->
  <rect x="55" y="120" width="20" height="40" rx="2" fill="url(#analytics-grad-2)" opacity="0.7">
    <animate attributeName="height" values="40;50;40" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y" values="120;110;120" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <rect x="85" y="100" width="20" height="60" rx="2" fill="url(#analytics-grad-2)" opacity="0.8">
    <animate attributeName="height" values="60;75;60" dur="2.2s" repeatCount="indefinite" />
    <animate attributeName="y" values="100;85;100" dur="2.2s" repeatCount="indefinite" />
  </rect>
  
  <rect x="115" y="90" width="20" height="70" rx="2" fill="url(#analytics-grad-2)" opacity="0.9">
    <animate attributeName="height" values="70;85;70" dur="2.4s" repeatCount="indefinite" />
    <animate attributeName="y" values="90;75;90" dur="2.4s" repeatCount="indefinite" />
  </rect>
  
  <rect x="145" y="110" width="20" height="50" rx="2" fill="url(#analytics-grad-2)" opacity="0.7">
    <animate attributeName="height" values="50;65;50" dur="2.6s" repeatCount="indefinite" />
    <animate attributeName="y" values="110;95;110" dur="2.6s" repeatCount="indefinite" />
  </rect>
  
  <rect x="175" y="105" width="20" height="55" rx="2" fill="url(#analytics-grad-2)" opacity="0.8">
    <animate attributeName="height" values="55;70;55" dur="2.8s" repeatCount="indefinite" />
    <animate attributeName="y" values="105;90;105" dur="2.8s" repeatCount="indefinite" />
  </rect>
  
  <!-- Baseline -->
  <line x1="45" y1="165" x2="205" y2="165" stroke="#5CB8E4" stroke-width="2" opacity="0.4" />
  
  <!-- Trend Line -->
  <polyline points="55,150 85,135 115,125 145,130 175,128" fill="none" stroke="#7A9FD6" stroke-width="2" opacity="0.6" stroke-dasharray="4 4">
    <animate attributeName="stroke-dashoffset" from="0" to="8" dur="1s" repeatCount="indefinite" />
  </polyline>
  
  <!-- Data Points -->
  <circle cx="55" cy="150" r="4" fill="#7A9FD6" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="85" cy="135" r="4" fill="#7A9FD6" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2.2s" repeatCount="indefinite" />
  </circle>
  <circle cx="115" cy="125" r="4" fill="#7A9FD6" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2.4s" repeatCount="indefinite" />
  </circle>
  <circle cx="145" cy="130" r="4" fill="#7A9FD6" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2.6s" repeatCount="indefinite" />
  </circle>
  <circle cx="175" cy="128" r="4" fill="#7A9FD6" opacity="0.8">
    <animate attributeName="r" values="4;5;4" dur="2.8s" repeatCount="indefinite" />
  </circle>
  
  <!-- Percentage Indicator -->
  <circle cx="190" cy="50" r="20" fill="none" stroke="#5CB8E4" stroke-width="2" opacity="0.5" />
  <text x="190" y="48" font-family="monospace" font-size="10" fill="#5CB8E4" text-anchor="middle" opacity="0.8">+</text>
  <text x="190" y="58" font-family="monospace" font-size="8" fill="#7A9FD6" text-anchor="middle" opacity="0.7">%</text>
  
  <!-- Floating particles -->
  <circle cx="60" cy="40" r="2" fill="#5CB8E4" opacity="0.5">
    <animate attributeName="cy" values="40;35;40" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="180" cy="190" r="2" fill="#7A9FD6" opacity="0.5">
    <animate attributeName="cy" values="190;185;190" dur="3.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="80" r="2" fill="#5CB8E4" opacity="0.5">
    <animate attributeName="cx" values="220;215;220" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
